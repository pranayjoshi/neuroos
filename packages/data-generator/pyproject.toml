[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "neuroos-data-generator"
version = "0.1.0"
description = "NeuroOS EEG/EMG dummy data generator (BCI hardware simulator)"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "scipy>=1.12",
    "click>=8.1",
    "pyyaml>=6.0",
]

[project.scripts]
data-generator = "data_generator.__main__:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.ruff]
target-version = "py311"
line-length = 100
