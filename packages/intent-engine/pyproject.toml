[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "neuroos-intent-engine"
version = "0.1.0"
description = "NeuroOS Intent Engine (AI classifier: FeatureVector → IntentEvent)"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "scipy>=1.12",
    "scikit-learn>=1.4",
    "onnxruntime>=1.17",
    "skl2onnx>=1.16",
    "onnx>=1.15",
]

[project.optional-dependencies]
training = [
    "torch>=2.2",
]
dev = [
    "pytest>=7.4",
    "pytest-benchmark",
    "pytest-asyncio>=0.23",
    "jsonschema>=4.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.ruff]
target-version = "py311"
line-length = 100
