[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "neuroos-intent-engine"
version = "0.1.0"
description = "NeuroOS Intent Engine (AI classifier: FeatureVector → IntentEvent)"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "scipy>=1.12",
    "onnxruntime>=1.17",
    "scikit-learn>=1.4",
]

[project.optional-dependencies]
training = [
    "torch>=2.2",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.ruff]
target-version = "py311"
line-length = 100
